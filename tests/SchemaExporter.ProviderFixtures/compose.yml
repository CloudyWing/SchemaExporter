name: schemaexporter-provider-fixtures

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-CU4-GDR1-ubuntu-24.04
    container_name: schemaexporter-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${SCHEMAEXPORTER_SQLSERVER_PASSWORD:?Set SCHEMAEXPORTER_SQLSERVER_PASSWORD before starting the fixture}
    ports:
      - "${SCHEMAEXPORTER_SQLSERVER_PORT:-11433}:1433"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/127.0.0.1/1433'"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 20s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2025-CU4-GDR1-ubuntu-24.04
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${SCHEMAEXPORTER_SQLSERVER_PASSWORD:?Set SCHEMAEXPORTER_SQLSERVER_PASSWORD before starting the fixture}
    volumes:
      - ./sqlserver/schema.sql:/fixtures/schema.sql:ro
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail

        SQLCMD="/opt/mssql-tools18/bin/sqlcmd"
        if [ ! -x "$$SQLCMD" ]; then
          SQLCMD="/opt/mssql-tools/bin/sqlcmd"
        fi

        for attempt in {1..60}; do
          if "$$SQLCMD" -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" >/dev/null 2>&1; then
            break
          fi

          if [ "$$attempt" -eq 60 ]; then
            echo "SQL Server did not become ready in time."
            exit 1
          fi

          sleep 2
        done

        "$$SQLCMD" -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "IF DB_ID(N'SchemaExporterFixture') IS NULL CREATE DATABASE [SchemaExporterFixture];"
        "$$SQLCMD" -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C -d SchemaExporterFixture -i /fixtures/schema.sql
